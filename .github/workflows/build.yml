name: Build Future Work Board
on:
  schedule:
    - cron: "0 * * * *"   # hourly baseline; the client-side overlay gives instant claim status between builds
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false   # don't cancel an in-flight Pages deploy
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm test
      - name: Restore LLM tag cache
        uses: actions/cache@v4
        with:
          path: llm-tag-cache.json
          key: llm-tags-${{ github.run_id }}
          restore-keys: llm-tags-
      - name: Build data
        run: node src/build.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set the ANTHROPIC_API_KEY repo secret to enable the LLM tagging
          # pass. Without it, the build falls back to keyword tagging automatically.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Stage publish dir
        run: cp web/lib.mjs docs/future-work/lib.mjs
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs/future-work }
      - id: deploy
        uses: actions/deploy-pages@v4
