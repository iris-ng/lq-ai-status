<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LQ-AI Work Pipeline</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>LQ-AI Work Pipeline</h1>
      <p id="subtitle"></p>
      <div id="stale" class="banner" hidden></div>
    </header>
    <main>
      <section class="search">
        <input id="corpusSearch" type="search" placeholder="What's up, LQ-AI? Ask anything — search every DE, issue & PR (open or closed)…" />
        <div id="searchResults" class="search-results" hidden></div>
      </section>

      <section class="toolbar">
        <select id="theme"></select>
        <select id="track"></select>
        <select id="difficulty"></select>
        <select id="status"></select>
        <select id="sort">
          <option value="latest">Latest first</option>
          <option value="oldest">Oldest first</option>
        </select>
        <label class="gfi-toggle"><input type="checkbox" id="gfi" /> Good first issues</label>
        <button id="reset" class="button" type="button">Reset</button>
      </section>

      <section id="board" class="board"></section>
      <p id="footNote" class="note"></p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
